<svg width="560" height="580" viewBox="0 0 560 580" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="580" fill="#ffffff"/>

  <!-- START -->
  <rect x="185" y="20" width="130" height="36" rx="18" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="250" y="38" text-anchor="middle" dominant-baseline="central" fill="#374151" font-weight="600" font-size="13">START</text>

  <!-- START → Agent -->
  <line x1="250" y1="56" x2="250" y2="95" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Agent Node -->
  <rect x="130" y="98" width="240" height="58" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="250" y="120" text-anchor="middle" dominant-baseline="central" fill="#4c1d95" font-weight="600" font-size="13">Agent node</text>
  <text x="250" y="140" text-anchor="middle" dominant-baseline="central" fill="#6d28d9" font-size="11">ChatOpenAI / Gemini / Qwen</text>

  <!-- Agent → Router -->
  <line x1="250" y1="156" x2="250" y2="200" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Router diamond -->
  <polygon points="250,202 360,272 250,342 140,272" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="250" y="264" text-anchor="middle" dominant-baseline="central" fill="#78350f" font-weight="600" font-size="13">Router</text>
  <text x="250" y="282" text-anchor="middle" dominant-baseline="central" fill="#92400e" font-size="11">Tool calls? Budget?</text>

  <!-- Router → Tools label -->
  <text x="88" y="255" text-anchor="middle" fill="#6b7280" font-size="11">Yes —</text>
  <text x="88" y="269" text-anchor="middle" fill="#6b7280" font-size="11">run tools</text>

  <!-- Router → Tools (left branch) -->
  <path d="M140 272 L55 272 L55 412" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Tools Node -->
  <rect x="5" y="414" width="210" height="72" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="110" y="436" text-anchor="middle" dominant-baseline="central" fill="#064e3b" font-weight="600" font-size="13">Tools node</text>
  <text x="110" y="454" text-anchor="middle" dominant-baseline="central" fill="#065f46" font-size="11">execute_python, web_search,</text>
  <text x="110" y="470" text-anchor="middle" dominant-baseline="central" fill="#065f46" font-size="11">scrape_website, analyze_image…</text>

  <!-- Tools → Agent (loop back, dashed) -->
  <path d="M55 414 L55 127 L130 116" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Router → Formatter label -->
  <text x="418" y="255" text-anchor="middle" fill="#6b7280" font-size="11">No /</text>
  <text x="418" y="269" text-anchor="middle" fill="#6b7280" font-size="11">budget exceeded</text>

  <!-- Router → Formatter (right branch) -->
  <path d="M360 272 L455 272 L455 412" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Formatter Node -->
  <rect x="345" y="414" width="210" height="58" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="434" text-anchor="middle" dominant-baseline="central" fill="#1e3a8a" font-weight="600" font-size="13">Formatter node</text>
  <text x="450" y="454" text-anchor="middle" dominant-baseline="central" fill="#1e40af" font-size="11">Extract final answer</text>

  <!-- Formatter → END -->
  <line x1="450" y1="472" x2="450" y2="508" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- END -->
  <rect x="385" y="510" width="130" height="36" rx="18" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="450" y="528" text-anchor="middle" dominant-baseline="central" fill="#374151" font-weight="600" font-size="13">END</text>
</svg>
